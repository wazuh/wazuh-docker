global
    log stdout format raw local0 info
    maxconn 50000
    daemon

defaults
    log     global
    mode    tcp
    option  tcplog
    option  dontlognull
    timeout connect 10s
    timeout client  1m
    timeout server  1m

#---------------------------------------------------------------------
# Frontend: Dashboard HTTPS (SNI passthrough on port 443)
#---------------------------------------------------------------------
frontend ft_dashboard
    bind *:443
    mode tcp
    option tcplog
    tcp-request inspect-delay 5s
    tcp-request content accept if { req.ssl_hello_type 1 }
    use_backend bk_dashboard if { req.ssl_sni -i wazuh.dashboard }
    default_backend bk_dashboard

backend bk_dashboard
    mode tcp
    balance roundrobin
    server dashboard wazuh.dashboard:5601 check

#---------------------------------------------------------------------
# Frontend: Wazuh agent events (TCP passthrough port 1514)
# Balanced between master and worker
#---------------------------------------------------------------------
frontend ft_agents
    bind *:1514
    mode tcp
    option tcplog
    default_backend bk_agents

backend bk_agents
    mode tcp
    balance leastconn
    server wazuh_master wazuh.master:1514 check
    server wazuh_worker wazuh.worker:1514 check

#---------------------------------------------------------------------
# Frontend: Wazuh agent enrollment (TCP passthrough port 1515)
#---------------------------------------------------------------------
frontend ft_enrollment
    bind *:1515
    mode tcp
    option tcplog
    default_backend bk_enrollment

backend bk_enrollment
    mode tcp
    balance roundrobin
    server wazuh_master wazuh.master:1515 check
